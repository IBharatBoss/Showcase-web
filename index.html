<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Website</title>
    <style>
        /* =========================================
           GLOBAL RESET & PREMIUM SHARP-EDGE POLICY
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border-radius: 0 !important; /* Strict zero border-radius for sharp edges */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            overflow-x: hidden;
            background-color: #ffffff;
        }

        /* =========================================
           1. TOP BAR (5% Height)
           ========================================= */
        #top-bar {
            height: 5vh;
            width: 100%;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            letter-spacing: 1px;
            font-weight: 500;
            text-transform: uppercase;
        }

        /* =========================================
           2. HEADER (10% Height)
           ========================================= */
        #header {
            height: 10vh;
            width: 100%;
            background-color: #ffffff;
            position: relative; /* Static flow as requested */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 1000;
        }

        .logo-container {
            height: 100%;
            display: flex;
            align-items: center;
        }

        .logo-container img {
            height: 95%;
            object-fit: contain;
        }

        /* Hamburger Menu Icon */
        .menu-btn {
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            z-index: 2000; /* Stays above overlay */
        }

        .menu-btn span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: #000000;
            transition: 0.4s ease-in-out;
        }

        .menu-btn.active span:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        .menu-btn.active span:nth-child(2) {
            opacity: 0;
        }
        .menu-btn.active span:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }

        /* Glassy Overlay Menu */
        #nav-overlay {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px); /* Apple style liquid glass */
            -webkit-backdrop-filter: blur(25px);
            z-index: 1500;
            transition: right 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex;
            flex-direction: column;
            padding: 5% 10%;
        }

        #nav-overlay.open {
            right: 0;
        }

        .overlay-logo {
            height: 10vh;
            margin-bottom: 5vh;
        }
        .overlay-logo img {
            height: 95%;
            object-fit: contain;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .nav-links li a {
            text-decoration: none;
            font-size: 2.5rem;
            font-weight: 700;
            color: #000000;
            transition: color 0.3s;
        }

        .nav-links li a:hover {
            color: #555555;
        }

        /* =========================================
           3. HERO SECTION (70% Height)
           ========================================= */
        #hero {
            height: 70vh;
            width: 100%;
            position: relative;
            background-color: #ffffff; /* Base top 20% white */
            overflow: hidden;
        }

        /* Fluid Physics "Rangoli" Gradient Background */
        .hero-bg-fluid {
            position: absolute;
            top: 20%; /* Top 20% is pure white */
            left: 0;
            width: 100%;
            height: 80%; /* Covers middle 30% (mix) and bottom 50% */
            z-index: 1;
            overflow: hidden;
            background: #ffffff;
        }

        /* Animated Colored Orbs for Premium Glassy Effect */
        .color-orb {
            position: absolute;
            filter: blur(90px);
            opacity: 0.8;
            animation: fluidMove 15s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .orb-1 { width: 50vw; height: 50vw; background: #ff4b4b; top: -10%; left: -10%; }
        .orb-2 { width: 60vw; height: 40vw; background: #4b7bff; bottom: -20%; right: -10%; animation-delay: -5s; }
        .orb-3 { width: 40vw; height: 40vw; background: #b04bff; top: 30%; left: 40%; animation-delay: -10s; }

        @keyframes fluidMove {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(10vw, -10vh) scale(1.1); }
            100% { transform: translate(-10vw, 5vh) scale(0.9); }
        }

        /* Glassmorphism layer over colors */
        .glass-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 2;
        }

        /* Hero Image/Video Slider */
        .hero-slider-container {
            position: absolute;
            top: 5%; /* 5% Top margin */
            left: 5%; /* 5% Left margin */
            width: 90%; /* Leaves 5% margin on right */
            height: 95%; /* 100% of hero minus top margin */
            z-index: 10;
            display: flex;
            overflow: hidden;
            background: #000; /* Placeholder for images */
        }

        .slide {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #111;
            color: #fff;
            font-size: 2rem;
            transition: transform 0.5s ease-in-out;
        }

        .slide img, .slide video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .hero-slider-container {
                height: 50%; /* 50% height in mobile */
            }
            .nav-links li a {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div id="top-bar">
        Welcome to the Premium Experience
    </div>

    <header id="header">
        <div class="logo-container">
            <img src="https://via.placeholder.com/150x50?text=LOGO" alt="Logo">
        </div>
        
        <div class="menu-btn" id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <nav id="nav-overlay">
        <div class="overlay-logo">
            <img src="https://via.placeholder.com/150x50?text=LOGO" alt="Logo">
        </div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">AI Tools</a></li>
            <li><a href="#">Portfolio</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <section id="hero">
        <div class="hero-bg-fluid">
            <div class="color-orb orb-1"></div>
            <div class="color-orb orb-2"></div>
            <div class="color-orb orb-3"></div>
            <div class="glass-layer"></div>
        </div>

        <div class="hero-slider-container" id="slider">
            <div class="slide">
                <span>Slide 1 (Image/Video Here)</span>
            </div>
            <div class="slide">
                <span>Slide 2</span>
            </div>
        </div>
    </section>

    <script>
        // 1. Hamburger Menu Logic
        const menuToggle = document.getElementById('menu-toggle');
        const navOverlay = document.getElementById('nav-overlay');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            navOverlay.classList.toggle('open');
        });

        // 2. Basic Slider Logic (Auto slide for demonstration)
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;

        function nextSlide() {
            currentSlide = (currentSlide + 1) % slides.length;
            slides.forEach(slide => {
                slide.style.transform = `translateX(-${currentSlide * 100}%)`;
            });
        }

        // Change slide every 3 seconds
        setInterval(nextSlide, 3000);
    </script>

</body>
</html>
